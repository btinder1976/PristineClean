    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#fff9f0"/><stop offset="1" stop-color="#e6d8c7"/></linearGradient>
    <linearGradient id="navy" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#123f5f"/><stop offset="1" stop-color="#071827"/></linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#65c943"/><stop offset="1" stop-color="#13966f"/></linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#f4bf87"/><stop offset="1" stop-color="#c67b4d"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#081827" flood-opacity=".18"/></filter>
    <filter id="blur"><feGaussianBlur stdDeviation="18"/></filter>
